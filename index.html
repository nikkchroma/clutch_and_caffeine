<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clutch & Caffeine</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="logo">CLUTCH<span>&</span>CAFFEINE</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#events">Events</a>
    <a href="#gallery">Gallery</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <h1>
      FUEL<br>
      YOUR<br>
      <span>PASSION</span>
    </h1>

    <p>Engines. Coffee. Chaos.</p>

    <div class="hero-buttons">
      <a href="#events" class="btn primary">ENTER</a>
      <a href="#gallery" class="btn outline">VIEW</a>
    </div>
  </div>
</section>

<!-- EVENTS -->
<section id="events" class="section">
  <h2>EVENTS</h2>

  <div class="event">
    <span>15 MAY</span>
    <h3>Midnight Run</h3>
  </div>

  <div class="event">
    <span>02 JUN</span>
    <h3>Dawn Coffee Meet</h3>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="section dark">
  <h2>GALLERY</h2>

  <div class="grid">
    <img src="images/g1.jpg">
    <img src="images/g2.jpg">
    <img src="images/g3.jpg">
    <img src="images/g4.jpg">
  </div>
</section>

</body>
</html>
